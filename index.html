<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EONGENESIS.ID · Futuristic Sempoa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ece5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #2c2a25;
        }

        /* Card utama */
        .card-app {
            max-width: 1300px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.15);
            padding: 40px 40px 48px;
            border: 1px solid #e0d7cb;
        }

        /* Header EONGENESIS.ID - Tengah, Bold, Font Menarik */
        .eogenesis-header {
            margin-bottom: 24px;
            border-bottom: 1px solid #dcd1c2;
            padding-bottom: 20px;
            text-align: center;
        }

        .eogenesis-header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #3a3228;
            text-transform: uppercase;
            font-family: 'Poppins', 'Inter', sans-serif;
            background: linear-gradient(135deg, #4a3f33, #2c241b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        /* HOME SCREEN dengan logo dan slogan */
        .home-screen {
            text-align: center;
            padding: 40px 20px 70px;
        }

        .logo-container {
            margin-bottom: 24px;
        }

        .abacus-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: #d9c8b0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(100, 70, 30, 0.15);
            border: 2px solid #b89f7a;
        }

        .abacus-logo svg {
            width: 50px;
            height: 50px;
        }

        .home-screen h2 {
            font-size: 3.3rem;
            font-weight: 400;
            color: #353027;
            margin-bottom: 16px;
            font-family: 'Times New Roman', serif;
        }

        .home-screen .slogan {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3a3228;
            margin-bottom: 48px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #5f4e38, #2f2a22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .go-btn {
            background: #2f2a24;
            border: none;
            border-radius: 50px;
            padding: 18px 80px;
            font-size: 1.6rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #4a4036;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .go-btn:hover {
            background: #403a32;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
        }

        /* Flashcard screen */
        .flashcard-screen {
            display: none;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f5f0e8;
            border-radius: 60px;
            padding: 8px 28px;
            margin-bottom: 30px;
            border: 1px solid #d6cbbb;
        }

        .timer {
            font-size: 2.2rem;
            font-weight: 500;
            color: #3f372d;
            background: white;
            padding: 4px 28px;
            border-radius: 50px;
            border: 1px solid #cdc0ad;
        }

        .counter {
            font-size: 1.3rem;
            color: #605548;
            background: white;
            padding: 4px 28px;
            border-radius: 50px;
            border: 1px solid #cdc0ad;
        }

        .counter span {
            font-weight: 600;
            color: #2f2922;
        }

        /* Wood card */
        .wood-card {
            background: #e2d4bf;
            background: linear-gradient(145deg, #e8ddcb, #d4c3aa);
            border-radius: 48px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #b9a58a;
            box-shadow: inset 0 1px 5px #fff8ed, 0 15px 22px -10px rgba(70, 50, 30, 0.2);
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #cbb99b;
            background: radial-gradient(circle at 30% 30%, #dacbb0, #bba787);
            border-radius: 36px;
            padding: 25px;
            border: 1px solid #9f8b6f;
            box-shadow: inset 0 2px 8px #efe3cf;
        }

        canvas#sorobanCanvas {
            display: block;
            width: 100%;
            max-width: 800px;
            height: auto;
            background: #d9c8b0;
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: inset 0 0 0 1px #b6a182, 0 10px 20px rgba(60, 40, 20, 0.2);
        }

        .number-display {
            text-align: center;
            font-size: 4.5rem;
            font-weight: 400;
            color: #352d22;
            background: #f1e7d9;
            margin: 24px 100px 0;
            border-radius: 70px;
            padding: 12px 0;
            border: 1px solid #cbb392;
            font-family: 'Times New Roman', serif;
            box-shadow: inset 0 1px 5px white;
        }

        .digit-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .digit-option {
            background: white;
            border: 1px solid #cfc3b2;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #4d4236;
            cursor: pointer;
            transition: all 0.15s;
        }

        .digit-option:hover {
            background: #f3ede4;
            border-color: #a99b88;
        }

        .digit-option.active {
            background: #2c2822;
            border-color: #2c2822;
            color: white;
        }

        .nav-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .nav-btn {
            background: white;
            border: 1px solid #cfc3b2;
            border-radius: 50px;
            padding: 14px 42px;
            font-size: 1.3rem;
            font-weight: 500;
            color: #3d362d;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            min-width: 160px;
        }

        .nav-btn:hover:not(:disabled) {
            background: #f3ede4;
            border-color: #a99b88;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background: #f1ece4;
        }

        .restart-btn {
            background: #2c2822;
            border-color: #2c2822;
            color: white;
        }

        .restart-btn:hover {
            background: #3f3830;
        }

        .message-panel {
            margin-top: 25px;
            text-align: center;
            font-size: 1.1rem;
            color: #86644c;
            min-height: 50px;
        }

        hr {
            border: none;
            border-top: 1px solid #e0d6c9;
            margin: 30px 0 10px;
        }
    </style>
</head>
<body>
    <div class="card-app">
        <!-- Header EONGENESIS.ID - Tengah, Bold, Font Menarik -->
        <div class="eogenesis-header">
            <h1>EONGENESIS.ID</h1>
        </div>

        <!-- HOME SCREEN dengan logo dan slogan -->
        <div id="homeScreen" class="home-screen">
            <div class="logo-container">
                <div class="abacus-logo">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="15" y="25" width="70" height="50" rx="8" fill="#b89f7a" stroke="#6b4f2e" stroke-width="3"/>
                        <line x1="25" y1="35" x2="25" y2="75" stroke="#6b4f2e" stroke-width="4"/>
                        <line x1="45" y1="35" x2="45" y2="75" stroke="#6b4f2e" stroke-width="4"/>
                        <line x1="65" y1="35" x2="65" y2="75" stroke="#6b4f2e" stroke-width="4"/>
                        <circle cx="25" cy="45" r="8" fill="#e0b05a" stroke="#8b5a2b" stroke-width="2"/>
                        <circle cx="45" cy="60" r="8" fill="#e0b05a" stroke="#8b5a2b" stroke-width="2"/>
                        <circle cx="65" cy="70" r="8" fill="#e0b05a" stroke="#8b5a2b" stroke-width="2"/>
                    </svg>
                </div>
            </div>
            <h2>Your Futuristic Sempoa</h2>
            <div class="slogan">TRAIN FOCUS, SPEED, AND LOGIC</div>
            <button class="go-btn" id="goBtn">Start</button>
        </div>

        <!-- FLASHCARD SCREEN -->
        <div id="flashcardScreen" class="flashcard-screen">
            <div class="stats-bar">
                <div class="timer" id="timerDisplay">01:00</div>
                <div class="counter">
                    <span id="currentCard">1</span> / <span id="totalCards">10</span>
                </div>
            </div>

            <!-- Kartu kayu -->
            <div class="wood-card">
                <div class="canvas-wrapper">
                    <canvas id="sorobanCanvas" width="750" height="500"></canvas>
                </div>
                <div class="number-display" id="angkaDisplay">0</div>
            </div>

            <!-- Pilihan digit -->
            <div class="digit-panel" id="digitPanel">
                <button class="digit-option" data-digit="1">Units</button>
                <button class="digit-option" data-digit="2">Tens</button>
                <button class="digit-option" data-digit="3">Hundreds</button>
                <button class="digit-option" data-digit="4">Thousands</button>
                <button class="digit-option" data-digit="5">Ten Thousands</button>
            </div>

            <!-- Navigasi -->
            <div class="nav-group">
                <button class="nav-btn" id="prevBtn" disabled>← Prev</button>
                <button class="nav-btn restart-btn" id="restartBtn">Restart (0)</button>
                <button class="nav-btn" id="nextBtn">Next →</button>
            </div>
            <div class="message-panel" id="infoPanel"></div>
        </div>
    </div>

    <script>
        (function() {
            // Konfigurasi
            const TOTAL_CARDS = 10;
            let currentNumbers = [];
            let currentIndex = 0;
            let timeLeft = 60;
            let timerInterval = null;
            let timerActive = true;
            let finished = false;
            let currentDigitMode = 1;

            // DOM
            const homeScreen = document.getElementById('homeScreen');
            const flashcardScreen = document.getElementById('flashcardScreen');
            const goBtn = document.getElementById('goBtn');
            const digitOptions = document.querySelectorAll('.digit-option');
            const canvas = document.getElementById('sorobanCanvas');
            const ctx = canvas.getContext('2d');
            const timerDisplay = document.getElementById('timerDisplay');
            const currentCardSpan = document.getElementById('currentCard');
            const totalCardsSpan = document.getElementById('totalCards');
            const angkaDisplay = document.getElementById('angkaDisplay');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const restartBtn = document.getElementById('restartBtn');
            const infoPanel = document.getElementById('infoPanel');

            totalCardsSpan.textContent = TOTAL_CARDS;

            // Generate angka acak
            function generateRandomNumbers(digitMode) {
                let min = 0, max = 0;
                switch(digitMode) {
                    case 1: min = 0; max = 9; break;
                    case 2: min = 0; max = 99; break;
                    case 3: min = 0; max = 999; break;
                    case 4: min = 0; max = 9999; break;
                    case 5: min = 0; max = 99999; break;
                    default: min = 0; max = 9;
                }
                return Array.from({ length: TOTAL_CARDS }, () => 
                    Math.floor(Math.random() * (max - min + 1)) + min
                );
            }

            // GAMBAR SEMPOA - Manik lebih bulat (ellipse mendekati lingkaran)
            // Warna tidak aktif lebih cerah (tidak kusam)
            function drawSoroban(number) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Latar belakang polos nude
                ctx.fillStyle = '#d9c8b0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Bingkai
                ctx.strokeStyle = '#7d6345';
                ctx.lineWidth = 14;
                ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);
                ctx.strokeStyle = '#b39873';
                ctx.lineWidth = 4;
                ctx.strokeRect(28, 28, canvas.width - 56, canvas.height - 56);

                // Palang horizontal
                ctx.fillStyle = '#7a603f';
                ctx.shadowColor = '#4f3d25';
                ctx.shadowBlur = 8;
                ctx.fillRect(45, 180, canvas.width - 90, 18);
                ctx.fillStyle = '#ab8b5a';
                ctx.fillRect(45, 183, canvas.width - 90, 6);
                ctx.shadowBlur = 0;

                // 5 TIANG
                const startX = 160;
                const gap = 100;
                const topY = 45;
                const bottomY = canvas.height - 50;

                for (let t = 0; t < 5; t++) {
                    const x = startX + t * gap;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#4f3a20';
                    ctx.lineWidth = 20;
                    ctx.strokeStyle = '#7b613f';
                    ctx.beginPath();
                    ctx.moveTo(x, topY);
                    ctx.lineTo(x, bottomY);
                    ctx.stroke();
                    
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = '#a88752';
                    ctx.beginPath();
                    ctx.moveTo(x - 3, topY + 15);
                    ctx.lineTo(x - 3, bottomY - 15);
                    ctx.stroke();
                }

                // MANIK - lebih bulat (ellipse dengan radius hampir sama) dan warna tidak aktif lebih cerah
                const numStr = number.toString().padStart(5, '0');
                for (let col = 0; col < 5; col++) {
                    const digit = parseInt(numStr[col], 10);
                    const topActive = digit >= 5 ? 1 : 0;
                    const bottomActive = digit % 5;
                    const xCenter = startX + col * gap;

                    // Manik atas - lebih bulat (radiusX=24, radiusY=26)
                    const yTop = 110;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#4f3a1f';

                    const gradTop = ctx.createRadialGradient(xCenter-4, yTop-6, 8, xCenter, yTop, 32);
                    if (topActive) {
                        gradTop.addColorStop(0, '#ffecb3');
                        gradTop.addColorStop(0.5, '#e5b048');
                        gradTop.addColorStop(1, '#b07d34');
                    } else {
                        // Warna tidak aktif lebih cerah
                        gradTop.addColorStop(0, '#d9bc8b');
                        gradTop.addColorStop(0.6, '#b08d56');
                        gradTop.addColorStop(1, '#8a663a');
                    }
                    ctx.fillStyle = gradTop;
                    ctx.beginPath();
                    ctx.ellipse(xCenter, yTop, 24, 26, 0, 0, Math.PI*2); // lebih bulat
                    ctx.fill();
                    ctx.strokeStyle = '#624a28';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();

                    // Manik bawah - lebih bulat, jarak 60px
                    const startBottom = 235;
                    const step = 60;
                    for (let m = 0; m < 4; m++) {
                        let yPos = startBottom + m * step;
                        const aktif = m < bottomActive;

                        const gradBottom = ctx.createRadialGradient(xCenter-4, yPos-6, 8, xCenter, yPos, 32);
                        if (aktif) {
                            gradBottom.addColorStop(0, '#ffedb3');
                            gradBottom.addColorStop(0.5, '#e8b44e');
                            gradBottom.addColorStop(1, '#b8863a');
                        } else {
                            // Warna tidak aktif lebih cerah
                            gradBottom.addColorStop(0, '#d9bc8b');
                            gradBottom.addColorStop(0.6, '#b08d56');
                            gradBottom.addColorStop(1, '#8a663a');
                        }
                        ctx.fillStyle = gradBottom;
                        ctx.shadowBlur = 12;
                        ctx.beginPath();
                        ctx.ellipse(xCenter, yPos, 24, 26, 0, 0, Math.PI*2); // lebih bulat
                        ctx.fill();
                        ctx.strokeStyle = '#624a28';
                        ctx.lineWidth = 2.5;
                        ctx.stroke();
                    }
                }
            }

            // Update card
            function refreshCard() {
                if (finished) return;
                const num = currentNumbers[currentIndex];
                angkaDisplay.textContent = num;
                drawSoroban(num);
                currentCardSpan.textContent = currentIndex + 1;
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === TOTAL_CARDS - 1;
            }

            // Timer
            function formatTime(sec) {
                return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
            }

            function updateTimer() {
                timerDisplay.textContent = formatTime(timeLeft);
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    timerDisplay.textContent = '00:00';
                    if (timerActive) stopTimer();
                }
            }

            function stopTimer() {
                clearInterval(timerInterval);
                timerActive = false;
                finished = true;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                infoPanel.innerHTML = '<div style="color: #86644c;">Time expired · Press Restart</div>';
            }

            // RESTART mereset ke 0 - sempoa kosong (angka 0)
            function restartToZero() {
                clearInterval(timerInterval);
                timeLeft = 60;
                currentIndex = 0;
                timerActive = true;
                finished = false;
                infoPanel.innerHTML = '';

                // SET ANGKA PERTAMA MENJADI 0 (sempoa kosong)
                currentNumbers = Array(TOTAL_CARDS).fill(0);
                
                updateTimer();
                refreshCard();

                prevBtn.disabled = true;
                nextBtn.disabled = false;

                timerInterval = setInterval(() => {
                    if (!timerActive || finished) return;
                    timeLeft--;
                    updateTimer();
                    if (timeLeft <= 0) {
                        timeLeft = 0;
                        updateTimer();
                        stopTimer();
                    }
                }, 1000);
            }

            // Fungsi untuk memulai dengan angka random
            function startWithRandom() {
                clearInterval(timerInterval);
                timeLeft = 60;
                currentIndex = 0;
                timerActive = true;
                finished = false;
                infoPanel.innerHTML = '';

                currentNumbers = generateRandomNumbers(currentDigitMode);
                
                updateTimer();
                refreshCard();

                prevBtn.disabled = true;
                nextBtn.disabled = false;

                timerInterval = setInterval(() => {
                    if (!timerActive || finished) return;
                    timeLeft--;
                    updateTimer();
                    if (timeLeft <= 0) {
                        timeLeft = 0;
                        updateTimer();
                        stopTimer();
                    }
                }, 1000);
            }

            function changeCard(delta) {
                if (finished) return;
                const newIdx = currentIndex + delta;
                if (newIdx >= 0 && newIdx < TOTAL_CARDS) {
                    currentIndex = newIdx;
                    refreshCard();
                }
            }

            // Event listeners
            goBtn.addEventListener('click', () => {
                homeScreen.style.display = 'none';
                flashcardScreen.style.display = 'block';

                digitOptions.forEach(opt => {
                    opt.classList.remove('active');
                    if (opt.dataset.digit === '1') opt.classList.add('active');
                });
                currentDigitMode = 1;
                startWithRandom();
            });

            digitOptions.forEach(btn => {
                btn.addEventListener('click', () => {
                    digitOptions.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDigitMode = parseInt(btn.dataset.digit, 10);
                    startWithRandom();
                });
            });

            prevBtn.addEventListener('click', () => changeCard(-1));
            nextBtn.addEventListener('click', () => changeCard(1));
            
            restartBtn.addEventListener('click', restartToZero);

            flashcardScreen.style.display = 'none';
        })();
    </script>
</body>
</html>
